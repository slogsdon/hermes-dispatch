# gtm-planner, go-to-market strategy from a product/feature brief.
# Alias: max, max tier, best quality for high-consequence work.
alias: max
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false  # the plan is multi-section Markdown, not one line
strip_think: false       # some reasoning models emit inline <think> tags; handled per config
strip_reasoning: true    # reasoning-channel models prepend a "┌─ Reasoning" block to stdout; strip it (safe no-op otherwise)
answer_anchor: "## Positioning"   # first heading of the plan; cut everything before it
