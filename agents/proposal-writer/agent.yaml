# proposal-writer, scope brief → structured client proposal
# Model: write → gpt-oss:20b (13.8 GB), long-form writing slot. A proposal is polished
# multi-section prose where tone and specificity matter; the 20B writer has the capacity for
# coherent, on-message copy without drifting into boilerplate.
alias: write
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true      # voice is set explicitly in the prompt, not by vault persona
ignore_user_config: false
quiet: true
parse_last_line: false
strip_think: false
strip_reasoning: true    # gpt-oss (write) prepends a "┌─ Reasoning" block to stdout, strip it
answer_anchor: "## Executive Summary"   # first heading of the proposal; cut anything before it
