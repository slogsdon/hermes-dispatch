# ─────────────────────────────────────────────────────────────────────────────
# Model preset: cloud APIs via LiteLLM (zero local setup)
#
# Every alias mapped to a hosted model. No Ollama, no GPU, no downloads. But it
# costs money per token and your prompts leave your machine. Good for trying the
# project, running on a laptop, or when local quality isn't enough.
#
# LiteLLM speaks to every provider with a uniform `provider/model` string and reads
# each provider's key from the environment. Set whichever you use:
#   export OPENAI_API_KEY=sk-...
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export GROQ_API_KEY=gsk_...
#
# Paste this `models:` block into config.yaml.
# ─────────────────────────────────────────────────────────────────────────────
models:
  # tiers (required)
  fast:     "openai/gpt-4o-mini"                 # cheap, quick triage/routing/chat
  balanced: "openai/gpt-4o-mini"                 # mid default (bump to gpt-4o for more)
  max:      "anthropic/claude-3-5-sonnet-latest" # best quality on the hard steps

  # task roles (optional; "" inherits the [tier])
  structured: "groq/llama-3.3-70b-versatile"     # [fast]     fast + cheap structured output
  code:       "anthropic/claude-3-5-sonnet-latest" # [balanced] strong code generation
  writing:    "openai/gpt-4o"                     # [balanced] long-form prose
  reasoning:  "openai/o4-mini"                    # [max]      reasoning model for analysis

# Notes
# -----
# - Cost control: `fast` and `structured` run on nearly every request, so keep them
#   on the cheapest capable models. Reserve frontier models for `max`/`code`.
# - The 64K-context-floor override in hermes-home/config.yaml is harmless for cloud
#   models (their real context is far larger); it only ever raises a declared number.
# - Groq is optional but the fastest cheap option for `structured`. Swap it for
#   `openai/gpt-4o-mini` to stay on one provider.
# - Update model names as providers ship new versions. These are point-in-time tags.
