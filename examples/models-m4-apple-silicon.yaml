# ─────────────────────────────────────────────────────────────────────────────
# Model preset: Apple Silicon (M4 Mac Mini, 32 GB unified memory)
#
# The maintainer's reference stack. Served by Ollama, routed through LiteLLM
# (`ollama_chat/<tag>`). MLX builds (`-mlx`) are tuned for Apple Silicon and faster
# than the GGUF equivalents on the same chip.
#
# THE 32 GB CEILING IS THE DESIGN CONSTRAINT. Unified memory is shared with the OS,
# so keep the resident model at 20 GB or under. The roster is built so the `max`
# tier (21.9 GB) runs ALONE, never co-resident with another large model. Pipelines
# are sequential by construction: each agent's model unloads before the next loads,
# so the chain respects the ceiling for free.
#
# Paste this `models:` block into config.yaml.
# ─────────────────────────────────────────────────────────────────────────────
models:
  # tiers (required)
  fast:     "ollama_chat/gemma4:e4b-mlx"     #  9.6 GB  quick: triage, routing, short chat
  balanced: "ollama_chat/granite4.1:8b"      #  ~5 GB   mid: solid default for most work
  max:      "ollama_chat/qwen3.6:35b-mlx"    # 21.9 GB  best quality; RUNS ALONE

  # task roles (optional; "" inherits the [tier])
  structured: "ollama_chat/lfm2:24b"         # [fast]     14.4 GB  fast structured output, no thinking
  code:       "ollama_chat/qwen3-coder:30b"  # [balanced] ~18 GB   strongest local coder
  writing:    "ollama_chat/gemma4:26b-mlx"   # [balanced] ~16 GB   long-form prose, no thinking channel
  reasoning:  "ollama_chat/deepseek-r1:14b"  # [max]       9.0 GB  chain-of-thought / arithmetic

# Notes
# -----
# - `reasoning` (deepseek-r1) is the one model whose Ollama template hard-rejects
#   tool definitions. The project's hermes-home/config.yaml disables ALL toolsets,
#   so zero tools are sent and it runs cleanly. Don't re-enable toolsets.
# - `reasoning` (real num_ctx 40960) and `structured` (32768) sit below Hermes' 64K
#   context floor; hermes-home/config.yaml raises their declared context_length to
#   64000 to satisfy the harness. Keep inputs to those two under ~32-40K tokens.
# - `balanced` is cheap but its accuracy on hard rubrics is low, which is why the
#   high-consequence agents (review, legal, strategy) use `max`. That's the dial.
