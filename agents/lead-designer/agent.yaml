# lead-designer, senior product-design direction & critique (text artifacts).
# Alias: max, max tier, best quality for high-consequence work.
alias: max
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false
strip_think: false       # some reasoning models emit inline <think> tags; handled per config
strip_reasoning: true    # reasoning-channel models prepend a "┌─ Reasoning" block to stdout; strip it (safe no-op otherwise)
answer_anchor: "## Read" # first heading of the critique; cut everything before it
