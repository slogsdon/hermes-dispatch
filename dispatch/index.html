<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0b0d10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hermes Dispatch</title>
<style>
  :root {
    --bg:#0b0d10; --panel:#15191e; --panel2:#1c2128; --line:#2a313a;
    --text:#e6edf3; --muted:#8b97a5; --accent:#5b9dff; --accent2:#0a3a86;
    --user:#234d8b; --agent:#171b21; --ok:#4cc38a; --err:#ff8088;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--text);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { display:flex; flex-direction:column; height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left); }

  header { flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:12px 16px; border-bottom:1px solid var(--line);
    background:rgba(11,13,16,.92); backdrop-filter:blur(8px); }
  header .back { display:none; background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:9px; padding:6px 11px; font-size:14px; font-weight:600; }
  header h1 { font-size:16px; margin:0; font-weight:650; letter-spacing:.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  header .sub { color:var(--muted); font-size:12px; margin-left:auto; white-space:nowrap; }

  .view { flex:1; overflow-y:auto; display:none; }
  body.view-chat #chat-view { display:flex; flex-direction:column; }
  body.view-agents #agents-view, body.view-sessions #sessions-view { display:block; }

  /* chat log */
  #log { flex:1 1 auto; overflow-y:auto; padding:16px 14px 8px; display:flex; flex-direction:column; gap:14px; }
  .empty { color:var(--muted); text-align:center; margin:auto; font-size:14px; max-width:30ch; }
  .turn { display:flex; flex-direction:column; gap:8px; }
  .bubble { max-width:88%; padding:11px 14px; border-radius:16px; white-space:pre-wrap;
    word-wrap:break-word; overflow-wrap:anywhere; font-size:15.5px; line-height:1.5; }
  /* rendered markdown (display only) — set on a bubble once its agent response completes */
  .bubble.md { white-space:normal; }
  .bubble.md > :first-child { margin-top:0; }
  .bubble.md > :last-child { margin-bottom:0; }
  .bubble.md h1, .bubble.md h2, .bubble.md h3, .bubble.md h4, .bubble.md h5, .bubble.md h6 {
    font-weight:600; line-height:1.25; letter-spacing:-0.01em; margin:0.9em 0 0.35em; }
  .bubble.md h1 { font-size:1.32em; } .bubble.md h2 { font-size:1.18em; }
  .bubble.md h3 { font-size:1.06em; } .bubble.md h4, .bubble.md h5, .bubble.md h6 { font-size:1em; }
  .bubble.md p { margin:0.55em 0; }
  .bubble.md ul, .bubble.md ol { margin:0.5em 0; padding-left:1.4em; }
  .bubble.md li { margin:0.2em 0; }
  .bubble.md code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:0.86em; background:var(--panel2); padding:1px 5px; border-radius:4px; }
  .bubble.md pre { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin:0.6em 0; overflow-x:auto; }
  .bubble.md pre code { background:none; padding:0; font-size:0.82em; line-height:1.5; white-space:pre; }
  .bubble.md blockquote { margin:0.6em 0; padding:0.2em 0 0.2em 12px; border-left:2px solid var(--line); color:var(--muted); }
  .bubble.md a { color:var(--accent); text-decoration:underline; text-underline-offset:2px; word-break:break-word; }
  .bubble.md hr { border:0; border-top:1px solid var(--line); margin:1em 0; }
  .bubble.md strong { font-weight:600; color:var(--text); }
  .bubble.md em { font-style:italic; }
  .user { align-self:flex-end; background:var(--user); border-bottom-right-radius:5px; }
  .agent { align-self:flex-start; background:var(--agent); border:1px solid var(--line); border-bottom-left-radius:5px; }
  .pill { align-self:flex-start; max-width:88%; background:var(--panel2); border:1px solid var(--line);
    border-radius:999px; padding:6px 12px; font-size:12.5px; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:7px; }
  .pill .who { color:var(--accent); font-weight:650; }
  .pill .why { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill .caret { margin-left:auto; opacity:.6; }
  .detail { align-self:flex-start; max-width:88%; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px; font-size:12.5px; color:var(--muted); white-space:pre-wrap; display:none; }
  .detail.open { display:block; }
  .detail b { color:var(--text); font-weight:600; }
  .badge { align-self:flex-start; font-size:12px; color:var(--muted); margin-bottom:-2px; display:flex; align-items:center; gap:6px; }
  .badge .nm { color:var(--accent); font-weight:650; }
  .badge .mdl { background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:1px 8px; font-size:11px; }
  .spinner { display:inline-block; width:13px; height:13px; border:2px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; animation:spin .8s linear infinite; vertical-align:-2px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .err { color:var(--err); border-color:#5a2730; }
  .actionrow { display:flex; gap:8px; align-self:flex-start; margin-top:2px; flex-wrap:wrap; }
  .act { background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:10px;
    padding:9px 16px; font-size:13.5px; font-weight:650; }
  .act:active { background:var(--line); }
  .act.primary, .pinbtn.active { background:var(--accent); color:#06101f; border-color:transparent; }
  .sysmsg { align-self:center; max-width:92%; text-align:center; background:var(--panel2); border:1px solid var(--line);
    color:var(--muted); border-radius:12px; padding:9px 14px; font-size:13.5px; line-height:1.45; }
  .sysmsg.err { color:var(--err); border-color:#5a2730; }
  .sysmsg strong { color:var(--text); font-weight:650; }
  .sysmsg code { background:#0b0d10; padding:1px 5px; border-radius:5px; font-size:12.5px; }
  /* pipeline progress panel */
  .pipe { align-self:stretch; max-width:100%; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:11px 13px; }
  .pipe .phead { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .pipe .ptitle { font-weight:600; font-size:14px; letter-spacing:-0.005em; color:var(--text); }
  .pipe .pcount { margin-left:auto; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10.5px; letter-spacing:0.04em; color:var(--muted); white-space:nowrap; }
  .pstep { display:flex; gap:9px; padding:7px 0; border-top:1px solid var(--line); }
  .pstep:first-child { border-top:0; }
  .pstep .pic { flex:0 0 16px; text-align:center; line-height:1.4; color:var(--muted); }
  .pstep .pbody { flex:1; min-width:0; }
  .pstep .pname { font-size:13.5px; color:var(--text); }
  .pstep .pagent { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10.5px; color:var(--muted); letter-spacing:0.03em; }
  .pstep .psum { font-size:12px; color:var(--muted); line-height:1.4; margin-top:2px; word-break:break-word;
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .pstep.pending { opacity:.45; }
  .pstep.running .pname { color:var(--accent); font-weight:600; }
  .pstep.done .pic { color:var(--ok); }
  .pstep.err .pic, .pstep.err .psum { color:var(--err); }
  .pstep.paused .pic { color:var(--text); }
  .ctxnote { align-self:flex-end; font-size:12px; color:var(--muted); margin:-4px 2px 0; }
  .ctxnote.refined { align-self:flex-start; color:var(--accent); }
  .editbox { width:100%; min-height:120px; background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:10px; font-size:14px; margin-top:6px; }

  /* pin banner + composer */
  #pinbar { display:none; align-items:center; gap:8px; padding:8px 14px; background:var(--accent2); border-top:1px solid var(--line); font-size:13px; }
  body.view-chat #pinbar.show { display:flex; }
  #pinbar .pintxt { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .unpin { background:transparent; border:0; color:var(--text); font-size:17px; padding:2px 8px; }
  #composer { display:none; flex:0 0 auto; gap:9px; align-items:flex-end; padding:10px 12px; border-top:1px solid var(--line); background:var(--bg); }
  body.view-chat #composer { display:flex; }
  #msg { flex:1; resize:none; max-height:140px; min-height:46px; padding:12px 14px; background:var(--panel);
    color:var(--text); border:1px solid var(--line); border-radius:14px; font-size:16px; line-height:1.4; }
  #send { flex:0 0 auto; width:46px; height:46px; border:0; border-radius:50%; background:var(--accent); color:#06101f; font-size:20px; font-weight:800; }
  #send:disabled { opacity:.45; }

  /* cards (agents + sessions) */
  .list { padding:14px; display:grid; gap:10px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; cursor:pointer; }
  .card:active { background:var(--panel2); }
  .card .top { display:flex; align-items:center; gap:8px; }
  .card .title { font-weight:650; font-size:16px; }
  .card .mdl { margin-left:auto; color:var(--muted); font-size:11px; background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:2px 9px; white-space:nowrap; }
  .card .desc { color:var(--muted); font-size:13px; margin-top:4px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .card .meta { color:var(--muted); font-size:12px; margin-top:7px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .tag { background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:1px 8px; font-size:11px; }
  .tag.agent { color:var(--accent); }
  .newbtn { width:100%; background:var(--accent); color:#06101f; border:0; border-radius:12px; padding:13px; font-size:15px; font-weight:700; margin-bottom:4px; }

  /* bottom nav */
  nav#bottomnav { flex:0 0 auto; display:flex; border-top:1px solid var(--line); background:var(--bg);
    padding-bottom:env(safe-area-inset-bottom); }
  nav#bottomnav button { flex:1; background:none; border:0; color:var(--muted); padding:9px 0 7px;
    font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; }
  nav#bottomnav button .ic { font-size:20px; line-height:1; }
  nav#bottomnav button.active { color:var(--accent); }
</style>
</head>
<body class="view-chat">
<header>
  <button class="back" id="back">‹</button>
  <h1 id="title">Hermes Dispatch</h1>
  <span class="sub" id="sub"></span>
</header>

<!-- CHAT -->
<section id="chat-view" class="view">
  <div id="log"><div class="empty" id="empty">Ask for anything, the dispatcher picks the right agent and runs it.</div></div>
</section>

<!-- AGENTS -->
<section id="agents-view" class="view">
  <div class="list" id="agents-list"></div>
</section>

<!-- SESSIONS -->
<section id="sessions-view" class="view">
  <div class="list" id="sessions-list">
    <button class="newbtn" id="new-session">+ New dispatch session</button>
  </div>
</section>

<div id="pinbar">
  <span class="pintxt"></span>
  <button id="unpin" class="unpin" aria-label="Unpin context">✕</button>
</div>
<form id="composer" autocomplete="off">
  <textarea id="msg" rows="1" placeholder="Message Hermes…" enterkeyhint="send"></textarea>
  <button id="send" type="submit" aria-label="Send">↑</button>
</form>

<nav id="bottomnav">
  <button data-view="chat" class="active"><span class="ic">💬</span>Chat</button>
  <button data-view="agents"><span class="ic">▦</span>Agents</button>
  <button data-view="sessions"><span class="ic">🕘</span>Sessions</button>
</nav>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log");
let busy = false;
let AGENTS = [];
let session = null;     // {id, type, agent, title, pinned, turns}
let pinned = null;      // current session's pinned context
let view = "chat";

const esc = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmt = (s) => esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/_([^_]+)_/g,"<em>$1</em>");
// Minimal, dependency-free markdown → HTML for DISPLAY ONLY. Agent output is untrusted
// (LLM-generated), so every line is HTML-escaped BEFORE any formatting and no raw HTML passes
// through; links are restricted to http(s). The raw markdown is what's stored as the artifact,
// saved to Obsidian, and passed to the next agent — this only changes how a response is shown.
function renderMarkdown(src) {
  const inline = (s) => esc(s)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g, "<em>$1</em>")
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  const lines = String(src == null ? "" : src).replace(/\r\n?/g, "\n").split("\n");
  const out = []; let para = [], list = null, i = 0;
  const flushPara = () => { if (para.length) { out.push("<p>" + para.map(inline).join("<br>") + "</p>"); para = []; } };
  const flushList = () => { if (list) { out.push(`<${list.type}>` + list.items.map(it => "<li>" + inline(it) + "</li>").join("") + `</${list.type}>`); list = null; } };
  const flush = () => { flushPara(); flushList(); };
  while (i < lines.length) {
    const ln = lines[i];
    if (/^\s*```+/.test(ln)) {                                   // fenced code block
      flush(); const body = []; i++;
      while (i < lines.length && !/^\s*```+\s*$/.test(lines[i])) { body.push(lines[i]); i++; }
      i++; out.push("<pre><code>" + esc(body.join("\n")) + "</code></pre>"); continue;
    }
    if (/^\s*$/.test(ln)) { flush(); i++; continue; }            // blank line
    const mH = ln.match(/^\s*(#{1,6})\s+(.*)$/);
    if (mH) { flush(); const l = mH[1].length; out.push(`<h${l}>` + inline(mH[2].replace(/\s+#+\s*$/, "")) + `</h${l}>`); i++; continue; }
    if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(ln)) { flush(); out.push("<hr>"); i++; continue; }  // rule
    const mUl = ln.match(/^\s*[-*+]\s+(.*)$/), mOl = ln.match(/^\s*\d+[.)]\s+(.*)$/);
    if (mUl || mOl) {
      const type = mUl ? "ul" : "ol";
      if (!list || list.type !== type) { flush(); list = { type, items: [] }; }
      list.items.push(mUl ? mUl[1] : mOl[1]); i++; continue;
    }
    if (/^\s*>\s?/.test(ln)) {                                   // blockquote
      flush(); const q = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { q.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
      out.push("<blockquote>" + q.map(inline).join("<br>") + "</blockquote>"); continue;
    }
    flushList(); para.push(ln.trim()); i++;                      // paragraph line
  }
  flush();
  return out.join("\n");
}
// Render raw markdown into a bubble for display. Pretty-printed JSON (structured agents) is
// shown verbatim in a code block rather than mangled as markdown.
function mdBubble(el, raw) {
  el.classList.add("md");
  const t = (raw == null ? "" : String(raw)).trim();
  if (t[0] === "{" || t[0] === "[") {
    try { JSON.parse(t); el.innerHTML = `<pre><code>${esc(t)}</code></pre>`; return; } catch (e) {}
  }
  el.innerHTML = renderMarkdown(raw);
}
const scroll = () => { log.scrollTop = log.scrollHeight; };
function clearEmpty() { const e = $("empty"); if (e) e.remove(); }
function shortTime(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d)?"":d.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}); }
function shortDate(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d)?"":d.toLocaleString([],{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }

// ---------- navigation ----------
function showView(name) {
  view = name;
  document.body.className = "view-" + name;
  document.querySelectorAll("#bottomnav button").forEach(b => b.classList.toggle("active", b.dataset.view === name));
  $("back").style.display = "none";
  if (name === "chat") setChatHeader();
  else if (name === "agents") { $("title").textContent = "Agents"; $("sub").textContent = `${AGENTS.length}`; renderAgents(); }
  else if (name === "sessions") { $("title").textContent = "Sessions"; $("sub").textContent = ""; renderSessions(); }
}
document.querySelectorAll("#bottomnav button").forEach(b => b.onclick = () => showView(b.dataset.view));

function setChatHeader() {
  if (!session) { $("title").textContent = "Hermes Dispatch"; $("sub").textContent = ""; return; }
  if (session.type === "direct") { $("title").textContent = "📋 " + session.agent; $("sub").textContent = "direct"; }
  else if (session.type === "pipeline") { $("title").textContent = "⛓ " + (session.pipeline || "pipeline"); $("sub").textContent = "pipeline"; }
  else { $("title").textContent = "💬 Dispatch"; $("sub").textContent = `${AGENTS.length} agents`; }
}

// ---------- chat rendering ----------
function userBubble(text) {
  const t = document.createElement("div"); t.className = "turn";
  const b = document.createElement("div"); b.className = "bubble user"; b.textContent = text;
  t.appendChild(b); log.appendChild(t); return t;
}
// o = {agent, model, intent, domain, expanded, withPill, onEdit?}
function routingPill(turn, o) {
  if (o.withPill) {
    const pill = document.createElement("div"); pill.className = "pill";
    pill.innerHTML = `<span>→</span><span class="who"></span><span class="why"></span><span class="caret">▾</span>`;
    pill.querySelector(".who").textContent = o.agent;
    pill.querySelector(".why").textContent = o.intent || "";
    const detail = document.createElement("div"); detail.className = "detail";
    detail.innerHTML = `<b>Why:</b> ${esc(o.intent||"…")}` + (o.domain ? `  ·  <b>Domain:</b> ${esc(o.domain)}` : "")
      + `\n\n<b>Expanded prompt sent to ${esc(o.agent)}:</b>\n${esc(o.expanded||"…")}`;
    if (o.onEdit) {
      const eb = document.createElement("button"); eb.className = "act"; eb.style.marginTop = "8px"; eb.textContent = "✏️ Edit";
      eb.onclick = (e) => { e.stopPropagation(); o.onEdit(); };
      detail.appendChild(document.createElement("br")); detail.appendChild(eb);
    }
    pill.onclick = () => detail.classList.toggle("open");
    turn.appendChild(pill); turn.appendChild(detail);
  }
  const badge = document.createElement("div"); badge.className = "badge";
  badge.innerHTML = `<span>⬢</span><span class="nm"></span><span class="mdl"></span>`;
  badge.querySelector(".nm").textContent = o.agent;
  badge.querySelector(".mdl").textContent = o.model || "";
  turn.appendChild(badge);
  const bubble = document.createElement("div"); bubble.className = "bubble agent";
  turn.appendChild(bubble); return bubble;
}
function refinedNote(turn) {
  const n = document.createElement("div"); n.className = "ctxnote refined"; n.textContent = "📝 manually refined";
  const b = turn.querySelector(".bubble.agent"); turn.insertBefore(n, b || null);
}
function systemBubble(text, ok = true) {
  const turn = document.createElement("div"); turn.className = "turn";
  const b = document.createElement("div"); b.className = "sysmsg" + (ok ? "" : " err"); b.innerHTML = fmt(text);
  turn.appendChild(b); log.appendChild(turn); scroll(); return b;
}
function contextNote(turn, agent) {
  const n = document.createElement("div"); n.className = "ctxnote";
  n.textContent = `↳ sent with context from ${agent || "a previous"}`; turn.appendChild(n);
}
function actionBar(turn, message, retryText) {
  const note = document.createElement("div"); note.className = "bubble agent err"; note.textContent = "⚠ " + message; turn.appendChild(note);
  const row = document.createElement("div"); row.className = "actionrow";
  const reload = document.createElement("button"); reload.className = "act primary"; reload.textContent = "Reload"; reload.onclick = () => location.reload();
  row.appendChild(reload);
  if (retryText) { const r = document.createElement("button"); r.className = "act"; r.textContent = "Retry"; r.onclick = () => { note.remove(); row.remove(); send(retryText); }; row.appendChild(r); }
  turn.appendChild(row); scroll();
}
function artifactControls(turn, artifactId, agent) {
  if (!artifactId) return;
  const row = document.createElement("div"); row.className = "actionrow";
  const pin = document.createElement("button"); pin.className = "act pinbtn"; pin.dataset.art = artifactId;
  pin.textContent = "📎 Use as context"; pin.onclick = () => togglePin(artifactId, agent);
  const save = document.createElement("button"); save.className = "act"; save.textContent = "Save to Obsidian";
  save.onclick = () => saveToObsidian(artifactId, save);
  row.appendChild(pin); row.appendChild(save); turn.appendChild(row); refreshPins();
}

function renderTurn(t) {
  if (t.kind === "system") { systemBubble(t.text || "", t.ok !== false); return; }
  if (t.kind === "pipeline-input") { userBubble(t.user_input || ""); return; }
  if (t.kind === "pipeline-output") { renderPipelineOutput(t); return; }
  const turn = userBubble(t.user_input);
  if (t.pinned_artifact_id) contextNote(turn, t.pinned_agent);
  if (t.agent_selected === "obsidian-save") { const b = systemBubble("📒 " + (t.agent_response||""), t.status!=="error"); return; }
  if (t.agent_selected) {
    const withPill = session && session.type !== "direct" && !!t.dispatcher_reasoning;
    const bubble = routingPill(turn, { agent:t.agent_selected, model:"", intent:t.dispatcher_reasoning,
      domain:t.domain, expanded:t.expanded_prompt, withPill });
    if (t.edited) refinedNote(turn);
    if (t.agent_response) mdBubble(bubble, t.agent_response);
    else { bubble.classList.add("err"); bubble.textContent = t.status === "pending" ? "(interrupted)" : "(no response)"; }
  }
  if (t.status === "ok" && t.artifact_id) artifactControls(turn, t.artifact_id, t.agent_selected);
  else if (t.status === "error") actionBar(turn, t.error || "this turn failed", t.user_input);
  else if (t.status === "pending") actionBar(turn, "interrupted, Reload to check, or Retry", t.user_input);
}

// ---------- pin (per session, persisted server-side) ----------
function refreshPins() {
  document.querySelectorAll(".pinbtn").forEach(b => {
    const on = pinned && b.dataset.art === pinned.artifact_id;
    b.classList.toggle("active", on);
    b.textContent = on ? "📎 Pinned as context" : "📎 Use as context";
  });
  const bar = $("pinbar");
  if (pinned) { bar.classList.add("show"); const tm = shortTime(pinned.time);
    bar.querySelector(".pintxt").textContent = `📎 Context: ${pinned.agent||"artifact"} output${tm?" from "+tm:""}`; }
  else bar.classList.remove("show");
}
function setPin(obj) {
  pinned = obj; refreshPins();
  if (!session) return;
  fetch("/pin", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ session_id: session.id, artifact_id: obj ? obj.artifact_id : "" }) })
    .then(r=>r.json()).then(j=>{ if(j && j.pinned!==undefined){ pinned=j.pinned; refreshPins(); } }).catch(()=>{});
}
function togglePin(artifactId, agent) {
  if (pinned && pinned.artifact_id === artifactId) setPin(null);
  else setPin({ artifact_id: artifactId, agent });
}
$("unpin").addEventListener("click", () => setPin(null));

async function saveToObsidian(artifactId, btn) {
  const orig = btn.textContent; btn.disabled = true; btn.textContent = "Saving…";
  try {
    const r = await fetch("/obsidian-save", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ artifact_id: artifactId, session_id: session ? session.id : "" }) });
    const j = await r.json();
    btn.textContent = j.ok ? "✓ Saved" : "⚠ Failed";
    systemBubble(j.system_text || (j.ok ? "📝 **Saved to Obsidian**" : "⚠️ Obsidian save failed: " + (j.error||"unknown")), !!j.ok);
  } catch (e) { btn.textContent = "⚠ Failed"; systemBubble("⚠️ Obsidian save failed: " + (e.message||e), false); }
  finally { setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 3000); }
}

// ---------- sessions + agents ----------
async function loadAgents() {
  try { AGENTS = (await (await fetch("/agents")).json()).agents || []; } catch { AGENTS = []; }
}
function renderAgents() {
  const el = $("agents-list"); el.innerHTML = "";
  AGENTS.forEach(a => {
    const c = document.createElement("div"); c.className = "card";
    c.innerHTML = `<div class="top"><span class="title"></span><span class="mdl"></span></div><div class="desc"></div>`;
    c.querySelector(".title").textContent = a.name;
    c.querySelector(".mdl").textContent = a.model;
    c.querySelector(".desc").textContent = a.desc || "";
    c.onclick = () => openDirectAgent(a.name);
    el.appendChild(c);
  });
}
async function renderSessions() {
  const el = $("sessions-list");
  el.innerHTML = ""; el.appendChild(newSessionBtn()); el.appendChild(newPipelineBtn());
  let sessions = [];
  try { sessions = (await (await fetch("/sessions")).json()).sessions || []; } catch {}
  sessions.forEach(s => {
    const c = document.createElement("div"); c.className = "card";
    const icon = s.type === "direct" ? "📋" : s.type === "pipeline" ? "⛓" : "💬";
    const agents = (s.agents||[]).map(a => `<span class="tag agent">${esc(a)}</span>`).join("");
    c.innerHTML = `<div class="top"><span class="title">${icon} ${esc(s.title)}</span></div>
      <div class="meta"><span>${esc(shortDate(s.updated_at))}</span><span class="tag">${s.turns} turns</span>${agents}</div>`;
    c.onclick = () => openSession(s.id);
    el.appendChild(c);
  });
}
function newSessionBtn() {
  const b = document.createElement("button"); b.className = "newbtn"; b.textContent = "+ New dispatch session";
  b.onclick = newDispatchSession; return b;
}

async function openSession(id) {
  try {
    const data = await (await fetch("/session?id=" + encodeURIComponent(id))).json();
    if (!data.session) return;
    session = data.session;
    localStorage.setItem("hermes_sid", session.id);
    pinned = session.pinned || null;
    log.innerHTML = "";
    const turns = session.turns || [];
    if (turns.length) turns.forEach(renderTurn);
    else { const e = document.createElement("div"); e.className = "empty";
      e.textContent = session.type === "direct" ? `Talking directly to ${session.agent}. Type your input below.`
        : session.type === "pipeline" ? `Describe what to build. ${session.pipeline || "The pipeline"} plans it, pauses for your approval, then writes + tests it.`
        : "Ask for anything, the dispatcher picks the right agent.";
      log.appendChild(e); }
    if (session.type === "pipeline") maybeShowPipelineResume();
    showView("chat"); refreshPins(); scroll();
  } catch (e) {}
}
async function newDispatchSession() {
  const j = await (await fetch("/sessions", { method:"POST", headers:{"Content-Type":"application/json"}, body:"{\"type\":\"dispatch\"}" })).json();
  if (j.session) openSession(j.session.id);
}
async function openDirectAgent(name) {
  const j = await (await fetch("/sessions", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ type:"direct", agent:name }) })).json();
  if (j.session) openSession(j.session.id);
}

// ---------- pipelines (multi-step orchestration) ----------
function newPipelineBtn() {
  const b = document.createElement("button"); b.className = "newbtn";
  b.style.background = "var(--panel2)"; b.style.color = "var(--text)"; b.style.border = "1px solid var(--line)";
  b.textContent = "⛓ New pipeline run"; b.onclick = choosePipeline; return b;
}
async function choosePipeline() {
  const el = $("sessions-list"); el.innerHTML = "";
  const back = document.createElement("button"); back.className = "newbtn";
  back.style.background = "var(--panel2)"; back.style.color = "var(--text)"; back.style.border = "1px solid var(--line)";
  back.textContent = "‹ Back"; back.onclick = renderSessions; el.appendChild(back);
  let pls = []; try { pls = (await (await fetch("/pipelines")).json()).pipelines || []; } catch {}
  if (!pls.length) {
    const e = document.createElement("div"); e.className = "empty"; e.textContent = "No pipelines defined (add a pipelines/*.json)."; el.appendChild(e); return;
  }
  pls.forEach(p => {
    const c = document.createElement("div"); c.className = "card";
    c.innerHTML = `<div class="top"><span class="title">⛓ ${esc(p.name)}</span><span class="tag">${p.n_steps} steps</span></div><div class="meta desc"></div>`;
    c.querySelector(".desc").textContent = p.description || "";
    c.onclick = () => openPipelineSession(p.name);
    el.appendChild(c);
  });
}
async function openPipelineSession(name) {
  const j = await (await fetch("/sessions", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ type:"pipeline", pipeline:name }) })).json();
  if (j.session) openSession(j.session.id);
}

async function sendPipeline(text) {
  if (busy || !text.trim() || !session) return;
  setBusy(true); clearEmpty();
  userBubble(text); scroll();
  const pp = pipelinePanel();
  try {
    const resp = await fetch("/run-pipeline", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ session_id: session.id, message: text }) });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);
    await readSSE(resp, (ev) => handlePipelineEvent(ev, pp));
  } catch (err) {
    pp.finish();
    systemBubble("⚠️ " + ((err && err.message) || err) + " — the pipeline may still be running; ↻ Refresh to check.", false);
  } finally { setBusy(false); }
}

async function resumePipeline(runId) {
  if (busy || !session) return;
  setBusy(true);
  const pp = pipelinePanel();
  try {
    const resp = await fetch("/resume-pipeline", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ session_id: session.id, run_id: runId }) });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);
    await readSSE(resp, (ev) => handlePipelineEvent(ev, pp));
  } catch (err) {
    pp.finish();
    systemBubble("⚠️ " + ((err && err.message) || err) + " — building may still be running; ↻ Refresh to check.", false);
  } finally { setBusy(false); }
}

function appendApproveButton(runId, label) {
  if (!runId) return;
  const turn = document.createElement("div"); turn.className = "turn";
  const row = document.createElement("div"); row.className = "actionrow";
  const ok = document.createElement("button"); ok.className = "act primary"; ok.textContent = label || "✅ Approve & build";
  ok.onclick = () => { row.remove(); resumePipeline(runId); };
  row.appendChild(ok); turn.appendChild(row); log.appendChild(turn); scroll();
}

function renderPipelineOutput(t) {
  const turn = document.createElement("div"); turn.className = "turn";
  const badge = document.createElement("div"); badge.className = "badge";
  badge.innerHTML = `<span>📄</span><span class="nm"></span>`;
  badge.querySelector(".nm").textContent = t.pipeline_key || t.agent_selected || "output";
  turn.appendChild(badge);
  const b = document.createElement("div"); b.className = "bubble agent";
  if (t.agent_response) mdBubble(b, t.agent_response); else b.textContent = "(empty)";
  turn.appendChild(b); log.appendChild(turn);
  if (t.artifact_id) artifactControls(turn, t.artifact_id, t.agent_selected);
}

function maybeShowPipelineResume() {
  if (!session || session.type !== "pipeline") return;
  if (session.pipeline_status === "paused" && session.pipeline_run_id) {
    appendApproveButton(session.pipeline_run_id, "✅ Approve spec & build");
  } else if (session.pipeline_status === "needs-human" && session.pipeline_run_id) {
    appendApproveButton(session.pipeline_run_id, "↻ Resume / retry build");
  } else if (session.pipeline_status === "running" && session.pipeline_run_id) {
    pollPipelineStatus(session.pipeline_run_id);
  } else if (session.pipeline_status === "running") {
    const turn = document.createElement("div"); turn.className = "turn";
    const b = document.createElement("div"); b.className = "sysmsg"; b.innerHTML = `<span class="spinner"></span> pipeline running…`;
    const row = document.createElement("div"); row.className = "actionrow";
    const r = document.createElement("button"); r.className = "act"; r.textContent = "↻ Refresh"; r.onclick = () => openSession(session.id);
    row.appendChild(r); turn.appendChild(b); turn.appendChild(row); log.appendChild(turn); scroll();
  }
}

function pipelinePanel() {
  const turn = document.createElement("div"); turn.className = "turn";
  const el = document.createElement("div"); el.className = "pipe";
  el.innerHTML = `<div class="phead"><span class="spinner"></span><span class="ptitle">Pipeline</span><span class="pcount"></span></div><div class="prows"></div>`;
  turn.appendChild(el); log.appendChild(turn); scroll();
  const rows = el.querySelector(".prows"), byId = new Map(), doneIds = new Set();
  let total = 0;
  const ICON = { pending:"○", running:`<span class="spinner"></span>`, done:"✓", error:"✗", paused:"⏸", "needs-human":"⏸" };
  function paintCount() {
    el.querySelector(".pcount").textContent =
      total ? `step ${Math.min(doneIds.size, total)} of ${total}`
            : (doneIds.size ? `${doneIds.size} step${doneIds.size > 1 ? "s" : ""}` : "");
  }
  function rowFor(id) {
    let r = byId.get(id);
    if (!r) {
      r = document.createElement("div"); r.className = "pstep pending";
      r.innerHTML = `<span class="pic">○</span><div class="pbody"><span class="pname"></span> <span class="pagent"></span><div class="psum"></div></div>`;
      r.querySelector(".pname").textContent = id;
      byId.set(id, r); rows.appendChild(r);
    }
    return r;
  }
  function update(id, status, { agent, summary, cycle } = {}) {
    const r = rowFor(id);
    const cls = status === "error" ? "err" : status === "running" ? "running"
      : status === "done" ? "done" : (status === "paused" || status === "needs-human") ? "paused" : "pending";
    r.className = "pstep " + cls;
    r.querySelector(".pic").innerHTML = ICON[status] || "○";
    if (agent) r.querySelector(".pagent").textContent = agent;
    const sumEl = r.querySelector(".psum");
    if (summary) sumEl.textContent = summary;
    else if (status === "running" && cycle != null) sumEl.textContent = `running tests · cycle ${cycle}…`;
    if (status === "done" || status === "error") { doneIds.add(id); paintCount(); }
  }
  return {
    turn,
    start(title, n, stepIds) {
      el.querySelector(".ptitle").textContent = title;
      if (n) total = n;
      (stepIds || []).forEach(rowFor); paintCount(); scroll();
    },
    update,
    finish() { const s = el.querySelector(".phead .spinner"); if (s) s.replaceWith(document.createTextNode("⛓")); },
    remove() { turn.remove(); },
  };
}

function handlePipelineEvent(ev, pp) {
  switch (ev.type) {
    case "pipeline-start": pp.start(ev.resume ? "Building" : "Planning", ev.n_steps, ev.step_ids); break;
    case "pipeline-run": if (session) session.pipeline_run_id = ev.run_id; break;
    case "pipeline-step": pp.update(ev.id, "running", { agent: ev.agent }); scroll(); break;
    case "pipeline-step-done": {
      const fallback = ev.ok ? "done" : ("failed" + (ev.exit_code != null ? ` (exit ${ev.exit_code})` : ""));
      pp.update(ev.id, ev.ok ? "done" : "error", { agent: ev.agent, summary: ev.summary || fallback }); scroll(); break;
    }
    case "pipeline-cycle": pp.update(ev.id, "running", { cycle: ev.cycle }); scroll(); break;
    case "pipeline-note": break;
    case "gate":
    case "pipeline-escalation":
    case "pipeline-done": pp.finish(); openSession(session.id); break;
    case "error": pp.remove(); systemBubble("⚠️ " + (ev.message || "pipeline error"), false); break;
  }
}

function pollPipelineStatus(runId) {
  const startSid = session.id;
  const pp = pipelinePanel();
  let fails = 0;
  async function tick() {
    if (!session || session.id !== startSid) return;   // user navigated away — stop polling
    let snap = null;
    try { const r = await fetch("/pipeline-status?run_id=" + encodeURIComponent(runId)); if (r.ok) snap = await r.json(); } catch {}
    if (!snap) { if (++fails > 5) { pp.remove(); return; } return void setTimeout(tick, 2000); }
    fails = 0;
    const TITLE = { running:"Running", paused:"Paused", complete:"Complete", error:"Failed" };
    pp.start(TITLE[snap.status] || "Pipeline", snap.n_steps, snap.step_ids);
    snap.steps.forEach(s => pp.update(s.id, s.status, { agent: s.agent, summary: s.summary, cycle: s.cycle }));
    if (["complete", "error", "paused"].includes(snap.status)) {
      pp.finish(); openSession(session.id);
      return;
    }
    setTimeout(tick, 2000);
  }
  tick();
}

// ---------- send (Tier 1+2 dispatch → optional edit → Tier 3 run) ----------
const AUTO_RUN_MS = 1500;
function setBusy(b) { busy = b; $("send").disabled = b; if (!b) scroll(); }

async function readSSE(resp, onEvent) {
  const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = "";
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream:true });
    const lines = buf.split("\n"); buf = lines.pop();
    for (const line of lines) {
      const s = line.trim(); if (!s.startsWith("data:")) continue;
      let ev; try { ev = JSON.parse(s.slice(5).trim()); } catch { continue; }
      onEvent(ev);
    }
  }
}
function savingBubble(turn) {
  const b = document.createElement("div"); b.className = "bubble agent";
  b.innerHTML = `<span class="spinner"></span> 📒 Saving to Obsidian…`; turn.appendChild(b); scroll(); return b;
}

async function send(text) {
  if (busy || !text.trim() || !session) return;
  if (session.type === "pipeline") return sendPipeline(text);
  setBusy(true); clearEmpty();
  const turn = userBubble(text);
  if (pinned) contextNote(turn, pinned.agent);
  scroll();
  const wait = document.createElement("div"); wait.className = "pill";
  wait.innerHTML = `<span class="spinner"></span><span>${session.type === "direct" ? "preparing…" : "dispatching…"}</span>`;
  turn.appendChild(wait); scroll();

  let willRun = false, actionEl = null;
  try {
    const resp = await fetch("/dispatch", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ session_id: session.id, message: text, pinned_artifact_id: pinned ? pinned.artifact_id : "" }) });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);
    await readSSE(resp, (ev) => {
      if (ev.type === "dispatched") {
        wait.remove(); willRun = true; startRun(turn, ev, text);   // startRun owns setBusy(false)
      } else if (ev.type === "action") {
        wait.remove(); if (ev.status === "saving") actionEl = savingBubble(turn);
      } else if (ev.type === "system") {
        wait.remove(); if (actionEl) { actionEl.remove(); actionEl = null; } systemBubble(ev.text || "", ev.ok !== false);
      } else if (ev.type === "error") {
        wait.remove(); actionBar(turn, ev.message || "error", text);
      }
    });
    if (!willRun) setBusy(false);
  } catch (err) {
    wait.remove(); actionBar(turn, (err.message || err) + ", Reload to check.", text); setBusy(false);
  }
}

// after dispatch: show the routing pill + expanded prompt; auto-run after a short
// window unless the user opens the editor. Then stream the target agent (Tier 3).
function startRun(turn, ev, originalText) {
  const ctx = { turnIdx: ev.turn_idx, agent: ev.agent, model: ev.model, expanded: ev.expanded_prompt || "" };
  let timer = null;
  const go = (text, edited) => { if (timer) { clearTimeout(timer); timer = null; } runAgent(turn, bubble, ctx, text, edited, originalText); };
  function openEditor() {
    if (timer) { clearTimeout(timer); timer = null; }
    const lbl = document.createElement("div"); lbl.className = "detail open"; lbl.innerHTML = `<b>Edit the prompt before sending to ${esc(ctx.agent)}:</b>`;
    const ta = document.createElement("textarea"); ta.className = "editbox"; ta.value = ctx.expanded; lbl.appendChild(ta);
    const row = document.createElement("div"); row.className = "actionrow";
    const sendBtn = document.createElement("button"); sendBtn.className = "act primary"; sendBtn.textContent = "Send to agent";
    sendBtn.onclick = () => { lbl.remove(); row.remove(); go(ta.value, true); };
    row.appendChild(sendBtn);
    turn.insertBefore(lbl, bubble.previousSibling ? bubble : null); turn.insertBefore(row, bubble); scroll(); ta.focus();
  }
  const bubble = routingPill(turn, { agent: ev.agent, model: ev.model, intent: ev.intent_summary,
    domain: ev.domain, expanded: ctx.expanded, withPill: !ev.direct, onEdit: ev.direct ? null : openEditor });
  bubble.innerHTML = `<span class="spinner"></span>`; scroll();
  if (ev.direct) go(ctx.expanded, false);
  else timer = setTimeout(() => go(ctx.expanded, false), AUTO_RUN_MS);
}

async function runAgent(turn, bubble, ctx, expandedText, edited, originalText) {
  bubble.innerHTML = `<span class="spinner"></span>`; let gotToken = false;
  try {
    const resp = await fetch("/run", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ session_id: session.id, turn_idx: ctx.turnIdx, expanded_prompt: expandedText, edited: !!edited }) });
    if (!resp.ok || !resp.body) throw new Error("HTTP " + resp.status);
    await readSSE(resp, (ev) => {
      if (ev.type === "token") { if (!gotToken) { bubble.textContent = ""; gotToken = true; } bubble.textContent += ev.content; scroll(); }
      else if (ev.type === "done") {
        if (!gotToken) bubble.textContent = "(empty response)";
        else mdBubble(bubble, bubble.textContent);   // swap raw stream → formatted markdown
        if (ev.edited) refinedNote(turn);
        if (ev.artifact_id) artifactControls(turn, ev.artifact_id, ev.agent);
      } else if (ev.type === "error") { actionBar(turn, ev.message || "error", originalText); }
    });
    if (!gotToken && !bubble.textContent) bubble.textContent = "(empty response)";
  } catch (err) {
    actionBar(turn, (err.message || err) + ", the agent may still be finishing; Reload to check.", originalText);
  } finally { setBusy(false); }
}

// composer
const msg = $("msg");
function autosize() { msg.style.height = "auto"; msg.style.height = Math.min(msg.scrollHeight, 140) + "px"; }
msg.addEventListener("input", autosize);
$("composer").addEventListener("submit", (e) => { e.preventDefault(); const t = msg.value; if (!t.trim() || busy) return; msg.value=""; autosize(); send(t); });
msg.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("composer").requestSubmit(); } });
$("new-session").onclick = newDispatchSession;
$("back").onclick = () => showView("chat");

// ---------- init ----------
async function init() {
  await loadAgents();
  let sid = localStorage.getItem("hermes_sid");
  let ok = false;
  if (sid) { try { const d = await (await fetch("/session?id=" + encodeURIComponent(sid))).json(); ok = !!d.session; } catch {} }
  if (!ok) {
    // pick most-recent dispatch session, else create one
    let sessions = [];
    try { sessions = (await (await fetch("/sessions")).json()).sessions || []; } catch {}
    const disp = sessions.find(s => s.type === "dispatch");
    if (disp) sid = disp.id;
    else { const j = await (await fetch("/sessions", { method:"POST", headers:{"Content-Type":"application/json"}, body:"{\"type\":\"dispatch\"}" })).json(); sid = j.session.id; }
  }
  await openSession(sid);
}
init();
</script>
