# ─────────────────────────────────────────────────────────────────────────────
# Model preset: NVIDIA 24 GB GPU (RTX 3090 / 4090)
#
# The 7 aliases mapped to CUDA-friendly quantized models on Ollama. 24 GB of
# dedicated VRAM is a hard wall (not shared with the OS), so the `max` tier uses a
# 32B at Q4 (~19 GB) that fits alone. As on the Mac, the heavy model stays resident
# by itself; pipelines serialize the large models for you.
#
# Tags are standard Ollama library models. Use `ollama pull <tag>` (without the
# `ollama_chat/` prefix, which is only LiteLLM's routing hint).
#
# Paste this `models:` block into config.yaml.
# ─────────────────────────────────────────────────────────────────────────────
models:
  # tiers (required)
  fast:     "ollama_chat/qwen2.5:1.5b"        #   ~1.5 GB  quick: triage, routing, short chat
  balanced: "ollama_chat/qwen2.5:7b"          #   ~5 GB    mid: solid default for most work
  max:      "ollama_chat/qwen2.5:32b"         #  ~19 GB    best quality; runs alone in 24 GB

  # task roles (optional; "" inherits the [tier])
  structured: "ollama_chat/mistral-small:24b" # [fast]     ~14 GB  fast structured output
  code:       "ollama_chat/qwen2.5-coder:14b" # [balanced] ~9 GB   code generation
  writing:    "ollama_chat/gemma2:27b"        # [balanced] ~16 GB  long-form prose
  reasoning:  "ollama_chat/deepseek-r1:14b"   # [max]      ~9 GB   chain-of-thought / analysis

# Notes
# -----
# - With 12-16 GB VRAM, drop `max`/`writing` to the 14B tier (qwen2.5:14b) or use
#   examples/models-minimal.yaml.
# - `codestral:22b` is a strong alternative for `code` if you have the VRAM.
# - Multi-GPU: Ollama shards a larger `max` model (e.g. qwen2.5:72b) across cards.
#   Bump it if you have 2x 24 GB and want maximum quality on the hard steps.
# - The 64K-context-floor note applies to `reasoning`/`structured`. See
#   hermes-home/config.yaml.
