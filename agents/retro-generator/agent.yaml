# retro-generator, synthesize raw project notes into a structured retrospective.
# Alias: reasoning, reasoning role, chain-of-thought.
alias: reasoning
provider: litellm
max_turns: 1
toolsets: ""            # synthesis only, project notes are pasted/piped in
ignore_rules: true      # do NOT inject the live vault/memory, keep the run deterministic
ignore_user_config: false
quiet: true
parse_last_line: false  # full structured Markdown retro, not a single line
strip_think: false
strip_reasoning: true    # reasoning-channel models prepend a "┌─ Reasoning" block to stdout; strip it (safe no-op otherwise)
answer_anchor: "## Wins"   # first heading of the retro; cut everything before it
