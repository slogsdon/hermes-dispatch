# invoice-tracker, extract invoice fields, emit minified JSON.
# Alias: structured, structured role, fast and reliable structured output.
alias: structured
provider: litellm
max_turns: 1
toolsets: ""            # invoice text is piped/pasted in, no file access needed
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: true   # guarantee a single JSON object on stdout for piping to jq
