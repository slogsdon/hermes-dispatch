# followup-drafter, last-interaction context → a short, natural follow-up email.
# Alias: writing, writing role, long-form prose.
alias: writing
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true      # voice is set explicitly in the prompt, not by vault persona
ignore_user_config: false
quiet: true
parse_last_line: false
strip_think: false
strip_reasoning: true    # reasoning-channel models prepend a "┌─ Reasoning" block to stdout; strip it (safe no-op otherwise)
answer_anchor: "## Follow-up Email"   # the single output heading; cut anything before it
