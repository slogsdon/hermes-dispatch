# decision-journal, capture a decision + its reasoning for future-you to review.
# Alias: reasoning, reasoning role, chain-of-thought.
alias: reasoning
provider: litellm
max_turns: 1
toolsets: ""            # the decision context is pasted/piped in, no fetching
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false  # output is a multi-section Markdown note, not one line
strip_think: false      # some reasoning models emit inline <think> tags; handled per config
strip_reasoning: true   # fallback; config's show_reasoning:false already suppresses the block
answer_anchor: "## Decision"   # first heading of the note; cut anything before it
