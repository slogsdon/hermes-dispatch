# prospect-researcher, company/contact → sales-call research brief
# Model: quality → qwen3.6:35b-mlx (21.9 GB), best local reasoning+judgment, and it
# SUPPORTS tool-calling. Sales research is accuracy-sensitive: a wrong pain point or a
# fabricated fact about a prospect is worse than no brief, so it earns the strong reasoner
# over the cheaper review/chat models.
# qwen3.6 routes thinking to a separate channel, so the visible brief is already clean;
# strip_reasoning + answer_anchor are a belt-and-braces fallback.
alias: quality
provider: litellm
max_turns: 1
toolsets: ""            # company/contact context is pasted/piped in, no fetching
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false  # the brief is multi-section Markdown, not one line
strip_think: false       # no inline <think> tags from qwen3.6
strip_reasoning: true    # fallback; config already suppresses the reasoning block
answer_anchor: "## Company Summary"   # first heading of the brief; cut anything before it
