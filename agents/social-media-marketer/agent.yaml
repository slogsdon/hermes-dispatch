# social-media-marketer, topic/draft → platform-tailored social posts.
# Alias: writing, brand-facing prose — same prose-tuned model as the blog/proposal agents
# (was `fast`; bumped 2026-06-20 — social copy is brand-facing, the weakest tier under-served it).
alias: writing
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false
strip_think: false       # this model emits clean output (no thinking channel)
