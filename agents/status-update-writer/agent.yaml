# status-update-writer, turn done/blocked/next bullets into a clean client status update.
# Alias: writing, writing role, long-form prose.
alias: writing
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true      # tone is set explicitly in the prompt, not by the vault persona
ignore_user_config: false
quiet: true
parse_last_line: false
strip_think: false
strip_reasoning: true    # reasoning-channel models prepend a "┌─ Reasoning" block to stdout; strip it (safe no-op otherwise)
answer_anchor: "## Status Update"   # first line of the update; cut anything before it
