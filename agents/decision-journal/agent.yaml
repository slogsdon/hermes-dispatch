# decision-journal, capture a decision + its reasoning for future-Shane to review
# Model: analyze → deepseek-r1:14b (9.0 GB), the reasoning slot. The point of this agent is
# to ELICIT and structure the reasoning behind a decision (why this, why now, what's the
# bet, what would change my mind) so future-Shane can audit it honestly, that's a reasoning
# task, not extraction, so it earns a reasoning model over `pipeline`. Now usable in the
# harness: the project home disables all toolsets, so zero tools are sent and deepseek-r1's
# template no longer rejects the call (see the README tool-compatibility note). Output is an
# Obsidian note destined for the vault's Decisions/ folder.
alias: analyze
provider: litellm
max_turns: 1
toolsets: ""            # the decision context is pasted/piped in, no fetching
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false  # output is a multi-section Markdown note, not one line
strip_think: false      # deepseek routes thinking to a channel, not inline <think> tags
strip_reasoning: true   # fallback; config's show_reasoning:false already suppresses the block
answer_anchor: "## Decision"   # first heading of the note; cut anything before it
