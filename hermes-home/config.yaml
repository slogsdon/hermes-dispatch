# hermes-home/config.yaml, lean, minimal-context project config for hermes-agents.
# Goal: nothing Hermes would otherwise inject into the context window (tools, skills,
# MCP, memory, base system prompt, persona, delegation) is left at its default, each is
# explicitly blanked here. Per-agent system prompts arrive via the runner's -q; the only
# thing with no built-in default is the custom LiteLLM provider, kept in full below.
_config_version: 23

model:
  default: balanced
  provider: litellm

agent:
  max_turns: 60
  tool_use_enforcement: auto
  reasoning_effort: medium
  system_prompt: ''            # no base persona prompt, agents supply their own via -q
  personalities: {}            # drop the persona library
  # Disable EVERY built-in toolset → zero tool definitions injected, no tool-grabbing.
  disabled_toolsets:
  - web
  - browser
  - terminal
  - file
  - code_execution
  - vision
  - video
  - image_gen
  - video_gen
  - x_search
  - moa
  - tts
  - skills
  - todo
  - memory
  - session_search
  - clarify
  - delegation
  - cronjob
  - messaging
  - homeassistant
  - spotify
  - yuanbao
  - computer_use

toolsets: []                   # no CLI plugin toolsets

display:
  show_reasoning: false        # no "┌─ Reasoning" block on stdout
  personality: ''              # no persona

security:
  tirith_enabled: false        # no scanner warning on stdout

memory:
  memory_enabled: false        # no memory injection (~2.2K chars saved)
  user_profile_enabled: false  # no user-profile injection (~1.4K chars saved)

delegation:
  orchestrator_enabled: false  # no sub-agent orchestration

skills:
  external_dirs: []            # no ambient skill injection

custom_providers:
- name: litellm
  base_url: http://localhost:4000/v1
  key_env: LITELLM_MASTER_KEY
  api_mode: chat_completions
  # One entry per canonical alias. context_length is what Hermes BUDGETS for the
  # alias; it must be >= 64000 (Hermes' floor) even if the backing model's real
  # num_ctx is smaller. Raise an entry if you map the alias to a longer-context model.
  # >>> GENERATED by bin/gen-roster.sh from models.yaml — DO NOT EDIT BELOW <<<
  # Edit ~/Code/claude-code-config/models.yaml and re-run bin/gen-roster.sh.
  models:
    # tiers
    fast:       { context_length: 131072 }
    balanced:   { context_length: 65536 }
    max:        { context_length: 131072 }
    # task roles
    structured: { context_length: 64000 }
    code:       { context_length: 65536 }
    writing:    { context_length: 65536 }
    reasoning:  { context_length: 64000 }
  # >>> END GENERATED — do not add hand edits inside this block <<<
