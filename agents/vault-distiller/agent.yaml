# vault-distiller, distill a long note into atomic concepts + links.
# Alias: max, max tier, best quality for high-consequence work.
alias: max
provider: litellm
max_turns: 1
toolsets: ""            # synthesis only, note content is pasted/piped in
ignore_rules: true      # do NOT inject the live vault/memory, keep the run deterministic
ignore_user_config: false
quiet: true
parse_last_line: false  # full structured Markdown output, not a single line
strip_reasoning: true    # reasoning-channel models prepend a "┌─ Reasoning" block to stdout; strip it (safe no-op otherwise)
answer_anchor: "## Atomic Concepts"   # first heading; cut everything before it
