# triage-router, classify/route an item to a fixed enum, emit minified JSON.
# Alias: structured, structured role, fast and reliable structured output.
alias: structured
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: true   # guarantee a single JSON line on stdout for piping to jq
