# inbox-triage, classify a batch of emails to a fixed enum, emit minified JSON.
# Alias: structured, structured role, fast and reliable structured output.
alias: structured
provider: litellm
max_turns: 1
toolsets: ""            # emails are pasted/piped in, no fetching
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: true   # the whole batch is ONE minified JSON array on stdout for piping to jq
