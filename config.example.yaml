# ─────────────────────────────────────────────────────────────────────────────
# hermes-dispatch configuration template
#
# Copy to config.yaml and edit. config.yaml is gitignored (it holds machine-local
# paths). Only the `models` block usually needs touching.
#
#   cp config.example.yaml config.yaml
# ─────────────────────────────────────────────────────────────────────────────

# Model aliases: two axes.
#
#   TIERS (required)  fast / balanced / max
#     The capability and cost spine. A consumer only HAS to map these three. Every
#     agent ultimately resolves to one of them.
#
#   TASK ROLES (optional)  structured / code / writing / reasoning
#     Point a role at its own dedicated model, or leave it "" to INHERIT the default
#     tier shown in [brackets]. setup.sh and the Docker bootstrap resolve the inherit
#     (an empty role reuses its tier's model). Set one only when a specialized model
#     beats the tier for that job (a coder for `code`, a CoT model for `reasoning`).
#
# Values are backend model strings (LiteLLM identifiers). For local Ollama use
# `ollama_chat/<tag>` (the chat path, not `ollama/`). See examples/ for hardware
# presets and docs/model-configuration.md for the full explanation.
#
# Defaults below are the Apple-Silicon (M4, 32 GB) reference stack.
models:
  # tiers (required)
  fast:     "ollama_chat/gemma4:e4b-mlx"     # small/quick: triage, routing, extraction, short chat
  balanced: "ollama_chat/granite4.1:8b"      # mid: solid default for most work
  max:      "ollama_chat/qwen3.6:35b-mlx"    # largest: best quality, high-consequence work

  # task roles (optional; "" = inherit the [tier] shown)
  structured: "ollama_chat/lfm2:24b"         # [fast]     fast, reliable structured/JSON output
  code:       "ollama_chat/qwen3-coder:30b"  # [balanced] code generation
  writing:    "ollama_chat/gemma4:26b-mlx"   # [balanced] long-form prose
  reasoning:  "ollama_chat/deepseek-r1:14b"  # [max]      chain-of-thought / analysis

# Gateway: any OpenAI-compatible endpoint. LiteLLM is the reference (it gives the
# alias→model mapping and unifies local+cloud), but Ollama's native /v1, vLLM, LM
# Studio, OpenRouter, etc. all work. The master key is read from ${hermes_home}/.env
# (LITELLM_MASTER_KEY); never commit it.
openai_base_url: "http://localhost:4000"

# Hermes Agent runtime.
hermes_home: "~/.hermes"                  # where profiles/, .env, state.db live
hermes_profiles_dir: "~/.hermes/profiles" # gen-profiles.sh writes desktop profiles here
hermes_artifacts_dir: "~/.hermes/artifacts"

# Obsidian (OPTIONAL, leave blank to disable the save-to-vault action entirely).
obsidian_vault: ""   # e.g. "~/Library/Mobile Documents/iCloud~md~obsidian/Documents/Personal"
obsidian_cli: "obsidian"

# Mobile dispatch server (dispatch/server.py).
server_host: "0.0.0.0"   # 0.0.0.0 so both localhost and the Tailscale URL reach it
server_port: 7777

# Dispatch routing models (which aliases power the two-layer dispatcher).
dispatch_router_model: "structured"   # fast structured model that picks the agent
dispatch_enhancer_model: "reasoning"  # capable model that expands your prompt

# Tailscale (OPTIONAL, for phone access). Just your device's tailnet name;
# `tailscale serve` provides the clean URL. Leave blank if not using mobile.
tailscale_hostname: ""   # e.g. "mac-mini" reachable at mac-mini.<tailnet>.ts.net
