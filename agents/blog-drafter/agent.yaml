# blog-drafter, long-form blog section drafter.
# Alias: writing, writing role, long-form prose.
alias: writing
provider: litellm
max_turns: 1            # one-shot draft; no tools, no loop
toolsets: ""
ignore_rules: true      # IMPORTANT: do not inherit any vault/skill persona injection
ignore_user_config: false
quiet: true
parse_last_line: false
