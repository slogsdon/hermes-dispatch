# seo-tester, run fixed SEO checks, emit machine-readable JSON (CI-style gate)
# Model: pipeline → lfm2:24b (14.4 GB), fast structured tasks, NO thinking. Clean JSON.
alias: pipeline
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: true   # guarantee a single JSON object on stdout for jq / CI
strip_think: false
