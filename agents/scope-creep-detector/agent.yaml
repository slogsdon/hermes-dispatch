# scope-creep-detector, classify a new client request against the agreed scope.
# Alias: reasoning, reasoning role, chain-of-thought.
alias: reasoning
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false  # multi-section Markdown verdict, not one line
strip_think: false       # some reasoning models emit inline <think> tags; handled per config
strip_reasoning: true    # inert fallback; config already suppresses the "┌─ Reasoning" block
answer_anchor: "## Verdict"   # first heading of the output; cut anything before it
