# contract-reviewer, fast risk pass over a contract/vendor agreement
# Model: quality → qwen3.6:35b-mlx (21.9 GB). This is a high-consequence judgment task:
# missing a limitation-of-liability cap or an auto-renewal trap costs real money, so it
# earns the strongest local reasoner, the same call made for pr-reviewer and seo-reviewer,
# where the smaller `review` (granite4.1:8b) inverted findings and miscalibrated severity.
# Legal-risk reading needs that accuracy. qwen3.6 routes thinking to a separate channel, so
# the project config's show_reasoning:false yields clean output; strip_reasoning +
# answer_anchor are a belt-and-braces fallback.
alias: quality
provider: litellm
max_turns: 1            # judge once over the pasted agreement; no tools, no loop
toolsets: ""            # contract text is piped/pasted in, no file access needed
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: false
strip_reasoning: true    # fallback; config already suppresses the reasoning block
answer_anchor: "## Verdict"   # first heading of the review; cut anything before it
