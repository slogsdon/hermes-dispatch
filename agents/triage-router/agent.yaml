# triage-router, classify/route an item to a fixed enum, emit minified JSON
# Model: pipeline → lfm2:24b (14.4 GB), "fast structured tasks, NO thinking".
# Chosen over `classify` (lfm2.5-thinking:1.2b) on purpose: the brief's live test showed
# the thinking model streams chain-of-thought before the JSON and mis-picks fields.
# pipeline emits clean structured output. parse_last_line is on as a belt-and-braces guard.
alias: pipeline
provider: litellm
max_turns: 1
toolsets: ""
ignore_rules: true
ignore_user_config: false
quiet: true
parse_last_line: true   # guarantee a single JSON line on stdout for piping to jq
